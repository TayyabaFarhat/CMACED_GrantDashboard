name: Daily Update – CMACED Startup Dashboard

on:
  schedule:
    # Run every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-data:
    name: Scrape & Validate Opportunities
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Python setup ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      # ── Install dependencies ─────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      # ── Scrape ───────────────────────────────────────────────────────────
      - name: Run scraper
        run: |
          cd scraper
          python scraper.py
        env:
          PYTHONUNBUFFERED: '1'

      # ── Validate ─────────────────────────────────────────────────────────
      - name: Validate links & archive expired
        run: |
          cd scraper
          python link_validator.py
        env:
          PYTHONUNBUFFERED: '1'

      # ── Commit changes ───────────────────────────────────────────────────
      - name: Commit updated JSON files
        run: |
          git config --local user.name  "CMACED Bot"
          git config --local user.email "cmaced-bot@superior.edu.pk"

          git add opportunities.json archive.json scraper/validation.log

          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore: auto-update opportunities [${TIMESTAMP}]"
            git push
            echo "Changes committed and pushed."
          fi

      # ── Summary ──────────────────────────────────────────────────────────
      - name: Print summary
        run: |
          echo "=== CMACED Dashboard Update Complete ==="
          echo "Opportunities:"
          python3 -c "
          import json
          opps = json.load(open('opportunities.json'))
          arch = json.load(open('archive.json'))
          print(f'  Active:   {len(opps)}')
          print(f'  Archived: {len(arch)}')
          national = sum(1 for o in opps if o.get('region') == 'national')
          intl     = sum(1 for o in opps if o.get('region') == 'international')
          print(f'  National: {national}')
          print(f'  Intl:     {intl}')
          "
